version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: quitsmoke_pg
    environment:
      POSTGRES_USER: quitsmoke
      POSTGRES_PASSWORD: quitsmoke_password
      POSTGRES_DB: quitsmoke_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # server:
  #   build: ./server
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - db
  #   environment:
  #     - DATABASE_URL=postgresql://quitsmoke:quitsmoke_password@db:5432/quitsmoke_db

volumes:
  postgres_data:
